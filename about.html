    <style>
        /* === RESET & BASE === */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background: #e8e0d4;
            color: #1a1a1a;
            line-height: 1.5;
            padding: 0;
        }
        img, svg, video {
            max-width: 100%;
            display: block;
        }
        a {
            color: #1a1a1a;
            text-decoration: none;
            border-bottom: 2px solid #1a1a1a;
        }
        a:hover {
            background: #1a1a1a;
            color: #e8e0d4;
        }
        ul, ol {
            list-style: none;
        }
        /* === TYPOGRAPHY === */
        h1, h2, h3, h4 {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }
        h1 {
            font-size: 3rem;
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }
        h2 {
            font-size: 2.2rem;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            border-bottom: 3px solid #1a1a1a;
            display: inline-block;
        }
        h3 {
            font-size: 1.4rem;
            line-height: 1.3;
            margin-bottom: 0.5rem;
        }
        p, li {
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .small {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        /* === LAYOUT & SPACING === */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }
            h1 {
                font-size: 2rem;
            }
            h2 {
                font-size: 1.6rem;
            }
        }
        /* === NAV === */
        nav {
            background: #1a1a1a;
            color: #e8e0d4;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #e8e0d4;
            border: none;
        }
        nav .logo:hover {
            background: transparent;
            color: #ff6b6b;
        }
        nav ul {
            display: flex;
            gap: 2rem;
        }
        nav ul a {
            color: #e8e0d4;
            border-bottom: 2px solid transparent;
            padding-bottom: 0.3rem;
            transition: border-color 0.2s;
        }
        nav ul a:hover {
            background: transparent;
            color: #e8e0d4;
            border-bottom-color: #ff6b6b;
        }
        nav ul a.active {
            border-bottom-color: #ff6b6b;
            font-weight: 700;
        }
        .hamburger {
            display: none;
            background: none;
            border: 2px solid #e8e0d4;
            color: #e8e0d4;
            font-size: 1.5rem;
            padding: 0.3rem 0.6rem;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: #1a1a1a;
                padding: 1rem;
                gap: 1rem;
            }
            nav ul.open {
                display: flex;
            }
            .hamburger {
                display: block;
            }
        }
        /* === TEL LINK (Flashing effect) === */
        .tel-link {
            display: inline-block;
            background: #ff6b6b;
            color: #1a1a1a;
            padding: 0.6rem 1.5rem;
            font-weight: 700;
            border: 3px solid #1a1a1a;
            text-decoration: none;
            animation: flash 1.5s infinite;
        }
        .tel-link:hover {
            background: #1a1a1a;
            color: #ff6b6b;
            animation: none;
        }
        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        /* === CARD === */
        .card {
            background: #f5f0e8;
            border: 3px solid #1a1a1a;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 6px 6px 0 #1a1a1a;
        }
        .card h3 {
            border-bottom: 2px solid #1a1a1a;
            padding-bottom: 0.3rem;
            margin-bottom: 0.8rem;
        }
        .card ul {
            padding-left: 1.2rem;
            list-style: square;
        }
        .card ul li {
            margin-bottom: 0.4rem;
        }
        /* === GRID === */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        /* === HERO === */
        .hero {
            padding: 4rem 0 3rem;
            border-bottom: 4px solid #1a1a1a;
            margin-bottom: 3rem;
        }
        .hero h1 {
            font-size: 3.5rem;
        }
        .hero p {
            font-size: 1.2rem;
            max-width: 700px;
        }
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.2rem;
            }
        }
        /* === SECTION === */
        section {
            padding: 3rem 0;
        }
        /* === FAQ (accordion) === */
        .faq-item {
            border: 2px solid #1a1a1a;
            margin-bottom: 1rem;
            background: #f5f0e8;
        }
        .faq-question {
            padding: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            color: #e8e0d4;
        }
        .faq-question::after {
            content: '+';
            font-size: 1.5rem;
        }
        .faq-question.open::after {
            content: '−';
        }
        .faq-answer {
            padding: 0 1rem 1rem;
            display: none;
        }
        .faq-answer.open {
            display: block;
        }
        /* === FOOTER === */
        footer {
            background: #1a1a1a;
            color: #e8e0d4;
            padding: 2rem 0;
            text-align: center;
            margin-top: 3rem;
            border-top: 4px solid #ff6b6b;
        }
        footer
